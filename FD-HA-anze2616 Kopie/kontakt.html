<!DOCTYPE html>
<html lang="de">
<head>

      <button class="hamburger" id="hamburger" aria-label="Menü öffnen">

      </button>

    <div class="hero-body">

  <script>
    (function(){
      var hamburger = document.getElementById('hamburger');
      var mobileNav = document.getElementById('mobile-nav');
      var schliessen = document.getElementById('mobile-nav-schliessen');
      function toggle() {
        hamburger.classList.toggle('offen');
        mobileNav.classList.toggle('offen');
        document.body.style.overflow = mobileNav.classList.contains('offen') ? 'hidden' : '';
      }
      hamburger.addEventListener('click', toggle);
      schliessen.addEventListener('click', toggle);
    })();
  </script>
